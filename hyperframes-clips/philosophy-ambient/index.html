<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Philosophy Ambient — Naga Codex</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #070707;
        font-family: "JetBrains Mono", ui-monospace, monospace;
      }

      [data-composition-id="philosophy-ambient"] {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background:
          radial-gradient(ellipse at 50% 45%, rgba(255, 107, 53, 0.14), transparent 58%),
          radial-gradient(circle at 18% 78%, rgba(255, 107, 53, 0.08), transparent 34%),
          radial-gradient(circle at 82% 22%, rgba(255, 255, 255, 0.04), transparent 28%),
          #070707;
      }

      .vignette {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at center, transparent 42%, rgba(0, 0, 0, 0.72) 100%),
          linear-gradient(180deg, rgba(10, 10, 10, 0.55), transparent 28%, transparent 72%, rgba(10, 10, 10, 0.65));
        pointer-events: none;
      }

      .scanlines {
        position: absolute;
        inset: 0;
        opacity: 0.08;
        background: repeating-linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.04) 0,
          rgba(255, 255, 255, 0.04) 1px,
          transparent 1px,
          transparent 4px
        );
        pointer-events: none;
      }

      .crosshair {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0.18;
      }

      .crosshair::before,
      .crosshair::after {
        content: "";
        position: absolute;
        background: rgba(255, 107, 53, 0.55);
      }

      .crosshair::before {
        width: 100%;
        height: 1px;
      }

      .crosshair::after {
        width: 1px;
        height: 100%;
      }

      .ring {
        position: absolute;
        width: 220px;
        height: 220px;
        border: 1px solid rgba(255, 107, 53, 0.35);
        border-radius: 999px;
        box-shadow: 0 0 40px rgba(255, 107, 53, 0.12);
      }

      .mist {
        position: absolute;
        border-radius: 999px;
        filter: blur(48px);
        background: rgba(255, 107, 53, 0.22);
        mix-blend-mode: screen;
      }

      .mist-a {
        width: 520px;
        height: 520px;
        left: 12%;
        top: 18%;
      }

      .mist-b {
        width: 680px;
        height: 680px;
        right: 8%;
        bottom: 10%;
        background: rgba(255, 140, 80, 0.16);
      }

      .mist-c {
        width: 360px;
        height: 360px;
        left: 44%;
        top: 58%;
        background: rgba(255, 255, 255, 0.05);
      }

      .grain {
        position: absolute;
        inset: -50%;
        opacity: 0.12;
        background-image:
          radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.35) 0.5px, transparent 0.6px),
          radial-gradient(circle at 80% 40%, rgba(255, 255, 255, 0.25) 0.5px, transparent 0.6px),
          radial-gradient(circle at 40% 80%, rgba(255, 255, 255, 0.2) 0.5px, transparent 0.6px);
        background-size: 3px 3px, 4px 4px, 5px 5px;
        pointer-events: none;
      }

      .telemetry {
        position: absolute;
        left: 72px;
        bottom: 72px;
        color: rgba(255, 107, 53, 0.55);
        font-size: 18px;
        letter-spacing: 0.32em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div
      data-composition-id="philosophy-ambient"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="8"
      data-track-index="0"
    >
      <div id="mist-a" class="clip mist mist-a" data-start="0" data-duration="8" data-track-index="1"></div>
      <div id="mist-b" class="clip mist mist-b" data-start="0" data-duration="8" data-track-index="2"></div>
      <div id="mist-c" class="clip mist mist-c" data-start="0" data-duration="8" data-track-index="3"></div>

      <div id="crosshair" class="clip crosshair" data-start="0" data-duration="8" data-track-index="4">
        <div id="ring" class="ring"></div>
      </div>

      <div id="scanlines" class="clip scanlines" data-start="0" data-duration="8" data-track-index="5"></div>
      <div id="grain" class="clip grain" data-start="0" data-duration="8" data-track-index="6"></div>
      <div id="vignette" class="clip vignette" data-start="0" data-duration="8" data-track-index="7"></div>

      <div id="telemetry" class="clip telemetry" data-start="0" data-duration="8" data-track-index="8">
        N_C_SYS_LOGS_ACTIVE // ALPHA_100
      </div>

      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        gsap.set(".mist-a", { x: 0, y: 0, scale: 1, opacity: 0.55 });
        gsap.set(".mist-b", { x: 0, y: 0, scale: 1.05, opacity: 0.42 });
        gsap.set(".mist-c", { x: 0, y: 0, scale: 0.95, opacity: 0.35 });
        gsap.set(".ring", { scale: 1, opacity: 0.55, rotation: 0 });
        gsap.set(".grain", { x: 0, y: 0 });
        gsap.set(".telemetry", { opacity: 0.45 });

        tl.to(".mist-a", { x: 36, y: -28, scale: 1.08, duration: 4, ease: "sine.inOut" }, 0)
          .to(".mist-b", { x: -42, y: 24, scale: 1.12, duration: 4, ease: "sine.inOut" }, 0)
          .to(".mist-c", { x: 18, y: -16, scale: 1.04, duration: 4, ease: "sine.inOut" }, 0)
          .to(".ring", { scale: 1.08, opacity: 0.72, rotation: 8, duration: 4, ease: "sine.inOut" }, 0)
          .to(".grain", { x: 24, y: -18, duration: 2, ease: "none", repeat: 1, yoyo: true }, 0)
          .to(".telemetry", { opacity: 0.72, duration: 2, ease: "sine.inOut", yoyo: true, repeat: 1 }, 0)
          .to(".mist-a", { x: 0, y: 0, scale: 1, duration: 4, ease: "sine.inOut" }, 4)
          .to(".mist-b", { x: 0, y: 0, scale: 1.05, duration: 4, ease: "sine.inOut" }, 4)
          .to(".mist-c", { x: 0, y: 0, scale: 0.95, duration: 4, ease: "sine.inOut" }, 4)
          .to(".ring", { scale: 1, opacity: 0.55, rotation: 0, duration: 4, ease: "sine.inOut" }, 4);

        window.__timelines["philosophy-ambient"] = tl;
      </script>
    </div>
  </body>
</html>
